mcs.metadata:
  componentName: "Iniciar sesión "
  description: Este tema del sistema se desencadena cuando el agente necesita iniciar sesión en el usuario o pedir al usuario que inicie sesión
kind: AdaptiveDialog
beginDialog:
  kind: OnSignIn
  id: main
  actions:
    - kind: ConditionGroup
      id: conditionGroup_ypjGKL
      conditions:
        - id: conditionItem_7XYIIR
          condition: =System.SignInReason = SignInReason.SignInRequired
          actions:
            - kind: SendActivity
              id: sendMessage_1jHUNO
              activity: ¡Hola! Para poder ayudarle, necesitaré que inicie sesión.

    - kind: OAuthInput
      id: gOjhZA
      title: Inicio de sesión
      text: Para continuar, inicie sesión