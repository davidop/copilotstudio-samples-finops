mcs.metadata:
  componentName: Despedida
  description: Este tema se desencadena cuando el usuario se despide. De forma predeterminada, no finaliza la conversación. Si desea finalizar la conversación cuando el usuario se despida, puede agregar una acción "Fin de la conversación" a este tema o redirigir al tema del sistema "Fin de la conversación".
kind: AdaptiveDialog
startBehavior: CancelOtherTopics
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Despedida
    includeInOnSelectIntent: false
    triggerQueries:
      - Adiós
      - Hasta pronto
      - Hasta otra
      - ¡Adiós!
      - No, gracias. Adiós.
      - No, gracias a ti, adiós.
      - No, gracias a usted, adiós.
      - ¡Hasta luego!

  actions:
    - kind: Question
      id: question_zf2HhP
      variable: Topic.EndConversation
      prompt: ¿Le gustaría terminar nuestra conversación?
      entity: BooleanPrebuiltEntity

    - kind: ConditionGroup
      id: condition_DGc1Wy
      conditions:
        - id: condition_DGc1Wy-item-0
          condition: =Topic.EndConversation = true
          actions:
            - kind: BeginDialog
              id: dn94DC
              dialog: crd3a_agent.topic.EndofConversation

        - id: condition_DGc1Wy-item-1
          condition: =Topic.EndConversation = false
          actions:
            - kind: SendActivity
              id: sendMessage_LdLhmf
              activity: Adelante. Estoy a la escucha.