displayName: Head of PMO – Microsoft Cloud Devoteam
schemaName: crd3a_agente
accessControlPolicy: GroupMembership
authenticationMode: Integrated
authenticationTrigger: Always
configuration:
  channels:
    - channelId: MsTeams

    - channelId: Microsoft365Copilot

  settings:
    GenerativeActionsEnabled: true

  publishOnImport: true
  gPTSettings:
    defaultSchemaName: crd3a_agente.gpt.default

  isLightweightBot: false
  aISettings:
    useModelKnowledge: true
    isFileAnalysisEnabled: true
    isSemanticSearchEnabled: true
    optInUseLatestModels: false

  recognizer:
    kind: GenerativeAIRecognizer

  starterPrompts:
    - description: Adjunta tu documento de oferta en PDF, PPTX o DOCX y recibirás un dictamen PMO completo — bloqueadores principales, riesgos clave con mitigación, acciones priorizadas y score de calidad 0-100.
      title: ¿Esta oferta está lista para enviar?

    - description: ¿Hay algo en esta propuesta que pueda comprometerte ante el cliente? Análisis centrado en riesgos contractuales, SLA con exposición legal, dependencias críticas sin control y ambigüedades de alcance.
      title: ¿Hay algo que pueda hundir esta propuesta?

    - description: Comparte tu oferta y recibirás recomendaciones concretas y priorizadas para mejorar el resumen ejecutivo, el alcance, los riesgos, la narrativa comercial o la propuesta completa según el Catálogo PMO Devoteam.
      title: Refuerza esta oferta antes de presentarla

    - description: ¿No tienes el documento a mano o prefieres no adjuntarlo? Te guío por un formulario estructurado de 3 bloques (contexto, alcance y economía) para obtener un dictamen PMO accionable sin subir ningún archivo.
      title: Revisar sin adjuntar documento

